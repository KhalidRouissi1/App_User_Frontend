name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 13.60.163.228 | tee -a ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ubuntu@13.60.163.228 << 'EOF'
          set -x  # Enable debugging

          # Kill any process running on ports 3000 and 3001 to avoid conflicts
          sudo lsof -t -i:3000 | xargs kill -9 || echo "No process using port 3000"
          sudo lsof -t -i:3001 | xargs kill -9 || echo "No process using port 3001"

          # Navigate to the application directory
          cd /var/www/dev-app/front/nextjs_front-master

          # Pull the latest changes from the main branch
          git pull origin main

          # Install dependencies (npm)
          npm install

          # Install PM2 if not installed
          if ! command -v pm2 &> /dev/null; then
            sudo npm install -g pm2
          fi

          # Start the Next.js application in development mode with PM2 on port 3000
          pm2 start npm --name "nextjs-app" -- run dev -- --port 3000

          # Optionally, tail your app logs if you have set up logging
          # tail -f /var/www/dev-app/front/nextjs_front-master/logs/*.log || echo "No log files found"
          EOF

      - name: Reload Nginx
        run: |
          ssh ubuntu@13.60.163.228 << 'EOF'
          sudo systemctl reload nginx
          EOF
