name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # This will trigger the action on pushes to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 16.171.29.59 >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ubuntu@16.171.29.59 << 'EOF'
          set -x  # Enable debugging

          # Kill any process running on port 3000 to avoid conflicts
          sudo lsof -t -i:3000 | xargs kill -9 || echo "No process using port 3000"

          # Check if the directory exists; if not, clone the repository
          if [ ! -d "/var/www/dev-app/front" ]; then
            git clone https://github.com/isslemziedi/FrontEnd_PI_S0 /var/www/dev-app/front
          fi

          # Navigate to the application directory
          cd /var/www/dev-app/front/nextjs_front-master

          # Pull the latest changes from the main branch
          git reset --hard  # Reset in case of any conflicts
          git pull origin main

          # Install dependencies (npm)
          npm install

          # Install pm2 globally if not already installed
          if ! command -v pm2 &> /dev/null
          then
            sudo npm install -g pm2
          fi

          # Stop the old pm2 process if it exists
          pm2 delete next-app || echo "No existing next-app process to delete"

          # Start the Next.js server with pm2
          pm2 start npm --name "next-app" -- run dev -- --host 0.0.0.0 --port 3000

          # Save the pm2 process list for startup on system reboot
          pm2 save

          # Display the logs to the GitHub Actions output
          pm2 logs next-app
          EOF

      - name: Reload Nginx
        run: |
          ssh ubuntu@16.171.29.59 << 'EOF'
          sudo systemctl reload nginx
          EOF
