name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H <your-ec2-ip> >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ubuntu@<your-ec2-ip> << 'EOF'
          set -x  # Enable debugging

          # Kill any process running on port 3000 to avoid conflicts
          sudo lsof -t -i:3000 | xargs kill -9 || echo "No process using port 3000"

          # Check if the directory exists; if not, clone the repository
          if [ ! -d "/var/www/dev-app/front" ]; then
            git clone https://github.com/isslemziedi/FrontEnd_PI_S0 /var/www/dev-app/front
          fi

          # Navigate to the application directory
          cd /var/www/dev-app/front/nextjs_front-master

          # Pull the latest changes from the main branch
          git reset --hard  # Reset in case of any conflicts
          git pull origin main

          # Install dependencies (npm)
          npm install

          # Build the app for production
          npm run build

          # Start the Next.js application in production mode
          npm start  # This runs the app in production mode

          # Optionally, tail your app logs if you have set up logging
          # tail -f /var/www/dev-app/front/nextjs_front-master/logs/*.log || echo "No log files found"
          EOF

      - name: Reload Nginx
        run: |
          ssh ubuntu@<your-ec2-ip> << 'EOF'
          sudo systemctl reload nginx
          EOF
